<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c96bff">
<title>RoomSync</title>
<script src="lib/peerjs.min.js"></script>
<script src="lib/qrcode.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --glass: rgba(255,255,255,0.06);
  --glass-hover: rgba(255,255,255,0.11);
  --border: rgba(255,255,255,0.1);
  --text: #f0f0f5;
  --muted: rgba(240,240,245,0.42);
  --accent: #c96bff;
  --accent2: #7b5fff;
  --green: #1ed760;
  --red: #ff4f6a;
  --mono: monospace;
  --sans: -apple-system, sans-serif;
  --card-bg: rgba(255,255,255,0.05);
  --shadow: 0 32px 72px rgba(0,0,0,0.75);
}
body.light {
  --bg: #f0eef8;
  --glass: rgba(0,0,0,0.05);
  --glass-hover: rgba(0,0,0,0.09);
  --border: rgba(0,0,0,0.1);
  --text: #12101e;
  --muted: rgba(18,16,30,0.45);
  --card-bg: rgba(255,255,255,0.8);
  --shadow: 0 32px 72px rgba(100,80,180,0.15);
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; transition: background 0.3s, color 0.3s; }

/* ── THEME TOGGLE ── */
.theme-toggle {
  position: fixed; top: 16px; right: 16px; z-index: 100;
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--glass); border: 1px solid var(--border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.theme-toggle:hover { background: var(--glass-hover); transform: scale(1.1); }

/* ── DYNAMIC BG ── */
#dyn-bg {
  position: fixed; inset: -100px; z-index: 0;
  background-size: cover; background-position: center;
  filter: blur(80px) brightness(0.18) saturate(2.5);
  transition: background-image 2s ease, filter 0.3s; pointer-events: none;
  will-change: background-image;
}
body.light #dyn-bg { filter: blur(80px) brightness(0.55) saturate(1.8); }
#dyn-vignette {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%);
}
body.light #dyn-vignette { background: radial-gradient(ellipse at center, transparent 30%, rgba(220,210,255,0.6) 100%); }

/* ── SCREENS ── */
.screen { 
  position: fixed; inset: 0; z-index: 2; 
  display: none; align-items: center; justify-content: center; 
  padding: 16px; overflow-y: auto; 
  animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  will-change: transform, opacity;
}
.screen.active { display: flex; }
@keyframes slideUp { 
  from { opacity:0; transform:translateY(20px) scale(0.98); } 
  to { opacity:1; transform:translateY(0) scale(1); } 
}

/* ── LANDING ── */
.land { text-align: center; max-width: 340px; width: 100%; }
.land-eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 6px; color: var(--accent); opacity: 0.8; margin-bottom: 20px; }
.land-title { font-size: clamp(40px,12vw,56px); font-weight: 700; line-height: 1; letter-spacing: -2px; margin-bottom: 10px; }
.land-title em { font-style: italic; color: var(--accent); }
.land-sub { font-size: 14px; color: var(--muted); margin-bottom: 48px; font-weight: 300; line-height: 1.6; }
.land-btns { display: flex; flex-direction: column; gap: 10px; }

.btn-fill { 
  padding: 17px; border-radius: 14px; border: none; 
  font-family: var(--sans); font-size: 14px; font-weight: 700; 
  cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
  letter-spacing: 0.3px; 
}
.btn-fill:active { transform: scale(0.96); }
.btn-fill.amber { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
.btn-fill.amber:hover { opacity: 0.88; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,107,255,0.35); }
.btn-fill.ghost { background: var(--glass); border: 1px solid var(--border); color: var(--text); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
.btn-fill.ghost:hover { background: var(--glass-hover); transform: translateY(-2px); }

/* ── SETUP SCREEN ── */
.setup-outer { width: 100%; max-width: 400px; }
.glass-card { 
  background: var(--card-bg); 
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); 
  border: 1px solid var(--border); 
  border-radius: 24px; padding: 28px; 
  box-shadow: var(--shadow);
}
.setup-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.setup-sub { font-size: 13px; color: var(--muted); margin-bottom: 22px; }

.mode-tabs { display: flex; gap: 6px; margin-bottom: 20px; background: rgba(0,0,0,0.25); border-radius: 12px; padding: 4px; }
.mode-tab { flex: 1; padding: 10px 6px; border: none; border-radius: 9px; background: transparent; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; }
.mode-tab.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }

.mode-panel { display: none; }
.mode-panel.active { display: block; }

/* ── ONLINE (YOUTUBE) MODE ── */
.input-box { display: flex; gap: 8px; margin-bottom: 16px; }
.input-field { flex: 1; background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text); outline: none; }
.input-field:focus { border-color: var(--accent); }

/* ── LOCAL FILES MODE ── */
.drop-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 28px 20px; text-align: center; cursor: pointer; margin-bottom: 14px; position: relative; }
.drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

/* ── PLAYER ── */
.player-wrap { width: 100%; max-width: 360px; }
#yt-player-container { width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; margin-bottom: 20px; display: none; }
#yt-player-container.active { display: block; }

.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.code-pill { background: rgba(201,107,255,0.1); border: 1px solid rgba(201,107,255,0.3); border-radius: 20px; padding: 7px 16px; font-family: var(--mono); font-size: 11px; letter-spacing: 3px; color: var(--accent); cursor: pointer; }

.art-wrap { position: relative; margin-bottom: 20px; }
.art-empty { width: 100%; aspect-ratio: 1; border-radius: 20px; background: var(--card-bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }

.controls { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 20px; }
.ctrl-btn { background: var(--glass); border: none; border-radius: 50%; width: 50px; height: 50px; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.ctrl-btn:hover { background: var(--glass-hover); }
.ctrl-btn.play { width: 64px; height: 64px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }

.prog-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; margin-bottom: 8px; position: relative; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; }

.status-line { text-align: center; font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 12px; }

/* ── YOUTUBE SEARCH ── */
#search-results {
  max-height: 200px; overflow-y: auto; background: var(--card-bg);
  border-radius: 12px; margin-top: 8px; display: none;
  border: 1px solid var(--border);
}
.search-item {
  display: flex; gap: 10px; padding: 8px; cursor: pointer; border-bottom: 1px solid var(--border);
}
.search-item:hover { background: var(--glass); }
.search-thumb { width: 80px; aspect-ratio: 16/9; border-radius: 4px; object-fit: cover; }
.search-info { flex: 1; min-width: 0; }
.search-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── QUEUE ── */
.queue-wrap { margin-top: 20px; }
.queue-title { font-size: 12px; font-family: var(--mono); color: var(--muted); margin-bottom: 8px; letter-spacing: 2px; }
.queue-list { display: flex; flex-direction: column; gap: 8px; }
.queue-item { display: flex; align-items: center; gap: 10px; background: var(--glass); padding: 8px 12px; border-radius: 10px; font-size: 12px; }

/* ── QR MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 500;
  display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px);
}
.modal { background: white; padding: 20px; border-radius: 20px; text-align: center; color: black; max-width: 300px; }

/* ── DIM MODE ── */
#dim-overlay {
  position: fixed; inset: 0; background: black; z-index: 1000;
  display: none; pointer-events: none; opacity: 0.9;
}
</style>
</head>
<body class="dark">

<div id="dyn-bg"></div>
<div id="dyn-vignette"></div>
<div id="dim-overlay"></div>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<div class="modal-overlay" id="qr-modal" onclick="this.style.display='none'">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:10px">Join Room</h3>
    <div id="qrcode" style="display:flex; justify-content:center; margin-bottom:15px"></div>
    <button class="btn-fill ghost" style="width:100%; color:black" onclick="document.getElementById('qr-modal').style.display='none'">Close</button>
  </div>
</div>

<!-- ══════════════════════════ LANDING -->
<div class="screen active" id="s-land">
  <div class="land">
    <div class="land-eyebrow">◈ ROOMSYNC</div>
    <h1 class="land-title">Music.<br><em>Together.</em></h1>
    <p class="land-sub">Sync YouTube and local files across all devices instantly</p>
    <div class="land-btns">
      <button class="btn-fill amber" onclick="showScreen('s-setup')">Host a Room</button>
      <button class="btn-fill ghost" onclick="showScreen('s-join')">Join a Room</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════ HOST SETUP -->
<div class="screen" id="s-setup">
  <div class="setup-outer">
    <div class="glass-card">
      <div class="setup-title">Start a Room</div>
      <div class="setup-sub">Choose your music source</div>

      <div class="mode-tabs">
        <button class="mode-tab active" id="tab-online" onclick="switchMode('online')">YouTube</button>
        <button class="mode-tab" id="tab-local" onclick="switchMode('local')">Local Files</button>
      </div>

      <div class="mode-panel active" id="panel-online">
        <div class="input-box">
          <input type="text" class="input-field" id="yt-search" placeholder="Search or paste YouTube URL..." oninput="doSearch(this.value)">
        </div>
        <div id="search-results"></div>
        <button class="btn-fill amber" style="width:100%; margin-top:10px" onclick="startWithYT()">Start Room</button>
      </div>

      <div class="mode-panel" id="panel-local">
        <div class="drop-zone">
          <input type="file" id="file-input" accept="audio/*" multiple onchange="handleFiles(this.files)">
          <div>Click to choose songs</div>
        </div>
        <div id="local-file-list" style="font-size:11px; color:var(--muted); margin-bottom:10px"></div>
        <button class="btn-fill amber" id="local-start-btn" style="width:100%; display:none" onclick="startWithLocal()">Start Room</button>
      </div>

      <button class="btn-back" style="width:100%; margin-top:10px; background:none; border:none; color:var(--muted); cursor:pointer" onclick="showScreen('s-land')">← Back</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════ JOIN -->
<div class="screen" id="s-join">
  <div class="join-wrap" style="text-align:center">
    <h2 style="margin-bottom:10px">Join a Room</h2>
    <input class="input-field" id="join-code" type="text" maxlength="6" style="text-align:center; font-size:24px; margin-bottom:20px" placeholder="CODE">
    <button class="btn-fill amber" style="width:100%" onclick="doJoin()">Join Room</button>
    <button class="btn-back" style="margin-top:20px; display:block; width:100%; background:none; border:none; color:var(--muted); cursor:pointer" onclick="showScreen('s-land')">← Back</button>
    <div class="status-line" id="join-status"></div>
  </div>
</div>

<!-- ══════════════════════════ PLAYER (HOST/GUEST) -->
<div class="screen" id="s-player">
  <div class="player-wrap">
    <div class="top-bar">
      <div style="font-size:10px; letter-spacing:2px">ROOMSYNC</div>
      <div style="display:flex; gap:8px">
        <div class="code-pill" onclick="showQR()">📷</div>
        <div class="code-pill" id="room-code-display" onclick="copyCode()">------</div>
      </div>
    </div>

    <div id="yt-player-container">
      <div id="yt-player"></div>
    </div>

    <div id="local-art" class="art-wrap">
      <div class="art-empty">
        <div style="font-size:40px" id="player-icon-big">🎵</div>
        <div id="track-name" style="font-size:14px; font-weight:700; text-align:center; padding:0 20px">Not Playing</div>
        <div id="track-artist" style="font-size:11px; color:var(--muted)">Artist</div>
      </div>
    </div>

    <div class="prog-bar" id="prog-bar" onclick="handleSeek(event)">
      <div class="prog-fill" id="prog-fill"></div>
    </div>
    <div style="display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-bottom:20px">
      <span id="curr-time">0:00</span>
      <span id="total-time">0:00</span>
    </div>

    <div class="controls">
      <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
      <button class="ctrl-btn play" id="play-btn" onclick="togglePlay()">
        <span id="play-icon">▶</span>
      </button>
      <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:20px">
        <button class="btn-fill ghost" style="flex:1; padding:10px; font-size:11px" onclick="toggleDim()">Battery Saver</button>
        <button class="btn-fill ghost" style="flex:1; padding:10px; font-size:11px" id="btn-wake">WakeLock: ON</button>
    </div>

    <div class="queue-wrap" id="queue-container">
        <div class="queue-title">UP NEXT</div>
        <div class="queue-list" id="queue-list">
            <div style="font-size:11px; color:var(--muted)">Queue is empty</div>
        </div>
    </div>

    <div class="status-line" id="player-status">Connected</div>
    <button class="btn-back" style="width:100%; margin-top:20px; background:none; border:none; color:var(--muted); cursor:pointer" onclick="location.reload()">Leave Room</button>
  </div>
</div>

<audio id="audio-el" style="display:none"></audio>

<script>
let peer = null, conn = null, connections = [];
let isHost = false, roomCode = "";
let ytPlayer = null, currentMode = 'online';
let audioEl = document.getElementById('audio-el');
let syncInterval = null;
let wakeLock = null;

// Queue & State
let queue = [];
let currentTrackIndex = 0;
let localFiles = [];

// ── WAKELOCK ──
async function requestWakeLock() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    document.getElementById('btn-wake').textContent = "WakeLock: ON";
    wakeLock.addEventListener('release', () => {
      document.getElementById('btn-wake').textContent = "WakeLock: OFF";
    });
  } catch (err) {
    document.getElementById('btn-wake').textContent = "WakeLock: ERR";
  }
}
requestWakeLock();

function toggleDim() {
  const overlay = document.getElementById('dim-overlay');
  overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
}

// ── YOUTUBE API ──
function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('yt-player', {
    height: '100%', width: '100%',
    playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'rel': 0 },
    events: {
        'onStateChange': onPlayerStateChange,
        'onReady': () => { if(isHost && queue.length > 0) loadTrack(0); }
    }
  });
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.ENDED) {
    nextTrack();
  }
  if (isHost) {
    broadcast({ t: 'state', s: event.data, time: ytPlayer.getCurrentTime() });
  }
}

// ── SEARCH ──
async function doSearch(query) {
    const resDiv = document.getElementById('search-results');
    if (query.length < 3) { resDiv.style.display = 'none'; return; }
    const videoId = extractVideoId(query);
    if (videoId) {
        resDiv.style.display = 'block';
        resDiv.innerHTML = `<div class="search-item" onclick="addToQueue('${videoId}', 'Direct Link')">
            <img class="search-thumb" src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg">
            <div class="search-info"><div class="search-title">Load Video from Link</div></div>
        </div>`;
    }
}

function addToQueue(id, title, isLocal = false, file = null) {
    queue.push({ id, title, isLocal, file });
    updateQueueUI();
    if (isHost && queue.length === 1) loadTrack(0);
    broadcast({ t: 'queue', q: queue.map(i => ({title: i.title, isLocal: i.isLocal})) });
}

function updateQueueUI() {
    const list = document.getElementById('queue-list');
    list.innerHTML = queue.slice(currentTrackIndex + 1).map(item => `
        <div class="queue-item">
            <span>${item.isLocal ? '🎵' : '📺'}</span>
            <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${item.title}</span>
        </div>
    `).join('') || '<div style="font-size:11px; color:var(--muted)">Queue is empty</div>';
}

// ── CORE LOGIC ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + mode).classList.add('active');
  document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + mode).classList.add('active');
}

// ── HOST ──
async function startWithYT() {
  const val = document.getElementById('yt-search').value;
  const videoId = extractVideoId(val);
  if (videoId && queue.length === 0) addToQueue(videoId, "YouTube Video");
  if (queue.length === 0) return alert("Add something to the queue first");
  isHost = true;
  await initPeer();
  showScreen('s-player');
  loadTrack(0);
  startSyncLoop();
}

function handleFiles(files) {
  localFiles = Array.from(files);
  document.getElementById('local-file-list').textContent = `${localFiles.length} files selected`;
  document.getElementById('local-start-btn').style.display = 'block';
  localFiles.forEach(f => addToQueue(URL.createObjectURL(f), f.name, true, f));
}

async function startWithLocal() {
  isHost = true;
  await initPeer();
  showScreen('s-player');
  loadTrack(0);
  startSyncLoop();
}

function loadTrack(index) {
    if (index >= queue.length) return;
    currentTrackIndex = index;
    const item = queue[index];
    document.getElementById('track-name').textContent = item.title;

    if (item.isLocal) {
        currentMode = 'local';
        document.getElementById('yt-player-container').classList.remove('active');
        document.getElementById('local-art').style.display = 'block';
        audioEl.src = item.id;
        audioEl.play();
        if(isHost) broadcast({ t: 'load', index, mode: 'local', title: item.title, file: item.file });
    } else {
        currentMode = 'online';
        document.getElementById('yt-player-container').classList.add('active');
        document.getElementById('local-art').style.display = 'none';
        ytPlayer.loadVideoById(item.id);
        if(isHost) broadcast({ t: 'load', index, mode: 'online', id: item.id, title: item.title });
    }
    updateQueueUI();
}

function nextTrack() { if(currentTrackIndex < queue.length - 1) loadTrack(currentTrackIndex + 1); }
function prevTrack() { if(currentTrackIndex > 0) loadTrack(currentTrackIndex - 1); }

// ── SYNC ENGINE (REWRITTEN FOR STABILITY) ──
async function sendLargeFile(targetConn, baseMsg) {
    const file = baseMsg.file;
    if (!file) return;
    const chunkSize = 16384;
    const totalChunks = Math.ceil(file.size / chunkSize);

    targetConn.send({
        t: 'file-start', id: baseMsg.id, title: baseMsg.title,
        index: baseMsg.index, mode: 'local', total: totalChunks
    });

    for (let i = 0; i < totalChunks; i++) {
        const chunk = await file.slice(i * chunkSize, (i + 1) * chunkSize).arrayBuffer();
        targetConn.send({ t: 'file-chunk', i, data: chunk });
        if (i % 20 === 0) await new Promise(r => setTimeout(r, 20));
    }
}

function broadcast(msg) {
    connections.forEach(c => {
        if (msg.file && msg.mode === 'local') sendLargeFile(c, msg);
        else c.send(msg);
    });
}

function startSyncLoop() {
  syncInterval = setInterval(() => {
    let time = 0, duration = 0, playing = false;
    if (currentMode === 'online') {
      time = ytPlayer.getCurrentTime() || 0;
      duration = ytPlayer.getDuration() || 0;
      playing = ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
    } else {
      time = audioEl.currentTime || 0;
      duration = audioEl.duration || 0;
      playing = !audioEl.paused;
    }
    updateUI(time, duration, playing);
    broadcast({ t: 'sync', time, playing });
  }, 1000);
}

let incomingFile = { chunks: [], total: 0, meta: null };

function handleData(data, c) {
    if (data.t === 'init') {
        queue = data.queue; currentTrackIndex = data.index;
        if (!data.current.file) applyTrack(data.current);
    } else if (data.t === 'file-start') {
        incomingFile = { chunks: [], total: data.total, meta: data };
        document.getElementById('player-status').textContent = "Receiving: 0%";
    } else if (data.t === 'file-chunk') {
        incomingFile.chunks[data.i] = data.data;
        const pct = Math.round((Object.keys(incomingFile.chunks).length / incomingFile.total) * 100);
        document.getElementById('player-status').textContent = `Receiving: ${pct}%`;
        if (Object.keys(incomingFile.chunks).length === incomingFile.total) {
            const blob = new Blob(incomingFile.chunks);
            applyTrack({ ...incomingFile.meta, file: blob });
            document.getElementById('player-status').textContent = "Synced";
        }
    } else if (data.t === 'load') {
        currentTrackIndex = data.index;
        if (data.mode === 'online') applyTrack(data);
    } else if (data.t === 'sync') {
        syncPlayback(data);
    } else if (data.t === 'queue') {
        queue = data.q; updateQueueUI();
    }
}

async function initPeer() {
  if (peer) peer.destroy();
  roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
  peer = new Peer('RS-' + roomCode);
  return new Promise(resolve => {
    peer.on('open', () => { document.getElementById('room-code-display').textContent = roomCode; resolve(); });
    peer.on('connection', c => {
      connections.push(c);
      c.on('open', () => {
        const item = queue[currentTrackIndex];
        const initMsg = {
            t: 'init', index: currentTrackIndex,
            queue: queue.map(i => ({title: i.title, isLocal: i.isLocal})),
            current: { mode: currentMode, id: item.id, title: item.title, file: item.isLocal ? null : item.id }
        };
        c.send(initMsg);
        if (item.isLocal) sendLargeFile(c, { ...item, index: currentTrackIndex });
      });
    });
    peer.on('error', e => { alert("Peer Error: " + e.type); });
  });
}

function doJoin() {
  const code = document.getElementById('join-code').value.toUpperCase();
  if (peer) peer.destroy();
  peer = new Peer();
  peer.on('open', () => {
    conn = peer.connect('RS-' + code, { reliable: true });
    conn.on('open', () => {
      roomCode = code; document.getElementById('room-code-display').textContent = code;
      showScreen('s-player');
    });
    conn.on('data', data => handleData(data, conn));
  });
}

function applyTrack(data) {
    document.getElementById('track-name').textContent = data.title;
    if (data.mode === 'online') {
        currentMode = 'online';
        document.getElementById('yt-player-container').classList.add('active');
        document.getElementById('local-art').style.display = 'none';
        ytPlayer.loadVideoById(data.id);
    } else {
        currentMode = 'local';
        document.getElementById('yt-player-container').classList.remove('active');
        document.getElementById('local-art').style.display = 'block';
        audioEl.src = URL.createObjectURL(data.file || new Blob([data.file]));
        audioEl.play();
    }
    updateQueueUI();
}

function syncPlayback(data) {
  if (currentMode === 'online') {
    const diff = Math.abs(ytPlayer.getCurrentTime() - data.time);
    if (diff > 2) ytPlayer.seekTo(data.time);
    if (data.playing) ytPlayer.playVideo(); else ytPlayer.pauseVideo();
  } else {
    const diff = Math.abs(audioEl.currentTime - data.time);
    if (diff > 2) audioEl.currentTime = data.time;
    if (data.playing) audioEl.play(); else audioEl.pause();
  }
}

function togglePlay() {
  if (currentMode === 'online') {
    if (ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
    else ytPlayer.playVideo();
  } else {
    if (audioEl.paused) audioEl.play(); else audioEl.pause();
  }
}

function updateUI(time, duration, playing) {
  const pct = (time / duration) * 100 || 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('curr-time').textContent = formatTime(time);
  document.getElementById('total-time').textContent = formatTime(duration);
  document.getElementById('play-icon').textContent = playing ? '⏸' : '▶';
}

function formatTime(s) {
  if (!s || isNaN(s)) return "0:00";
  const min = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${min}:${sec.toString().padStart(2, '0')}`;
}

function extractVideoId(url) {
  const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
  const match = url.match(regExp);
  return (match && match[2].length === 11) ? match[2] : null;
}

function showQR() {
    document.getElementById('qrcode').innerHTML = "";
    new QRCode(document.getElementById("qrcode"), {
        text: window.location.href.split('?')[0] + "?room=" + roomCode,
        width: 128, height: 128
    });
    document.getElementById('qr-modal').style.display = 'flex';
}

function copyCode() {
    navigator.clipboard.writeText(roomCode);
    const el = document.getElementById('room-code-display');
    const old = el.textContent;
    el.textContent = "COPIED!";
    setTimeout(() => el.textContent = old, 1000);
}

function toggleTheme() { document.body.classList.toggle('light'); }

window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const r = params.get('room');
    if(r) { document.getElementById('join-code').value = r; showScreen('s-join'); }
}
</script>
